streams:
  # Stream name matches your Wyze cam name (lowercase, underscores).
  # wyze-bridge auto-names cameras from your Wyze account.
  # Check http://pi-ip:5000 after startup to confirm the exact stream name.
  balcony: rtsp://wyze-bridge:8554/balcony

api:
  listen: :1984

webrtc:
  listen: :8555
